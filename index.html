<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF6 復盤筆記產生器</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181b22;
    --border: #1e2330;
    --accent: #e8a020;
    --accent2: #c45c1a;
    --win: #3ecf6a;
    --lose: #e05050;
    --text: #d4d8e2;
    --text-dim: #6b7280;
    --text-muted: #3a3f4d;
    --mono: 'Rajdhani', sans-serif;
    --body: 'Noto Sans TC', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--body); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(232,160,32,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 90%, rgba(196,92,26,0.04) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .wrap { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }

  header { margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 28px; }
  .logo { font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.3em; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
  h1 { font-family: var(--mono); font-size: 32px; font-weight: 700; letter-spacing: 0.04em; color: #fff; line-height: 1; }
  h1 span { color: var(--accent); }
  .subtitle { margin-top: 8px; font-size: 13px; color: var(--text-dim); }

  .section { margin-bottom: 28px; }
  .section-label {
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    letter-spacing: 0.3em; color: var(--accent); text-transform: uppercase;
    margin-bottom: 12px; display: flex; align-items: center; gap: 10px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.05em; }
  input, textarea {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: var(--body); font-size: 13px;
    padding: 9px 12px; border-radius: 4px; outline: none; transition: border-color 0.15s; width: 100%;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 70px; line-height: 1.6; }

  /* Stats */
  .stats-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .stat-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 3px; padding: 5px 12px;
    font-family: var(--mono); font-size: 12px; color: var(--text-dim);
  }
  .stat-badge b { font-weight: 700; font-size: 14px; }

  /* Char breakdown table */
  .char-table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; overflow: hidden; margin-bottom: 16px; }
  .char-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .char-table th {
    text-align: left; padding: 7px 12px;
    color: var(--text-muted); font-family: var(--mono); font-weight: 600;
    letter-spacing: 0.1em; font-size: 10px; text-transform: uppercase;
    border-bottom: 1px solid var(--border); background: var(--surface2);
  }
  .char-table th.r { text-align: right; }
  .char-table td { padding: 7px 12px; border-bottom: 1px solid rgba(30,35,48,0.5); font-family: var(--mono); color: var(--text-dim); }
  .char-table td.r { text-align: right; }
  .char-table td.cn { color: var(--text); font-weight: 600; font-family: var(--body); font-size: 13px; }
  .char-table tr:last-child td { border-bottom: none; }
  .char-table tr:hover td { background: rgba(255,255,255,0.02); }
  .rate-hi  { color: var(--win) !important; }
  .rate-mid { color: var(--accent) !important; }
  .rate-lo  { color: var(--lose) !important; }
  .char-table-empty { padding: 12px; font-size: 12px; color: var(--text-muted); font-style: italic; }

  /* Round lights */
  .rounds-section { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: 12px 14px; }
  .rounds-section-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; }
  .round-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid rgba(30,35,48,0.6); }
  .round-row:last-child { border-bottom: none; padding-bottom: 0; }
  .round-dot-btns { display: flex; align-items: center; gap: 6px; flex-shrink: 0; width: 160px; }
  .round-label { font-family: var(--mono); font-size: 11px; color: var(--text-muted); width: 36px; flex-shrink: 0; }
  .round-btn {
    width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--text-muted);
    background: transparent; cursor: pointer; font-size: 0; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; position: relative;
  }
  .round-btn::after {
    content: ''; width: 10px; height: 10px; border-radius: 50%;
    background: var(--text-muted); opacity: 0.25; transition: all 0.15s;
  }
  .round-btn:hover::after { opacity: 0.5; }
  .round-btn.round-win-active  { border-color: var(--win); }
  .round-btn.round-win-active::after  { background: var(--win);  opacity: 0.55; }
  .round-btn.round-lose-active { border-color: var(--lose); }
  .round-btn.round-lose-active::after { background: var(--lose); opacity: 0.55; }
  .round-dot-preview { font-size: 0; margin-left: 4px; width: 14px; height: 14px; border-radius: 50%; background: var(--text-muted); opacity: 0.15; }
  .round-note-input {
    flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--border);
    color: var(--text); font-family: var(--body); font-size: 12px; padding: 4px 6px;
    outline: none; transition: border-color 0.15s; border-radius: 0;
  }
  .round-note-input:focus { border-bottom-color: var(--accent); }
  .round-note-input::placeholder { color: var(--text-muted); }
  .round-lights-header { font-size: 14px; letter-spacing: 2px; }

  /* Match cards */
  .match-list { display: flex; flex-direction: column; gap: 10px; }
  .match-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; transition: border-color 0.15s; }
  .match-card.win-card  { border-color: rgba(62,207,106,0.28); }
  .match-card.lose-card { border-color: rgba(224,80,80,0.22); }

  .match-header {
    display: grid; grid-template-columns: 42px 1fr 144px 32px;
    align-items: center; gap: 10px; padding: 11px 14px;
    cursor: pointer; user-select: none; transition: background 0.1s;
  }
  .match-header:hover { background: var(--surface2); }

  .match-num { font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--text-muted); line-height: 1; }
  .match-summary { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .match-char { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; }
  .match-char-placeholder { color: var(--text-muted); font-size: 13px; }

  .match-result-tag { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.08em; padding: 3px 8px; border-radius: 3px; }
  .tag-win  { background: rgba(62,207,106,0.14); color: var(--win);  border: 1px solid rgba(62,207,106,0.3); }
  .tag-lose { background: rgba(224,80,80,0.12);  color: var(--lose); border: 1px solid rgba(224,80,80,0.3); }
  .tag-none { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }

  .match-result-btns { display: flex; gap: 6px; }
  .rb {
    flex: 1; padding: 6px 0; border-radius: 3px; border: 1px solid var(--border);
    font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: 0.05em;
    cursor: pointer; background: transparent; color: var(--text-dim); transition: all 0.15s;
  }
  .rb.win-active  { background: rgba(62,207,106,0.14); border-color: var(--win);  color: var(--win); }
  .rb.lose-active { background: rgba(224,80,80,0.12);  border-color: var(--lose); color: var(--lose); }
  .rb:hover { opacity: 0.8; }

  .del-btn {
    width: 28px; height: 28px; background: transparent; border: 1px solid var(--border);
    border-radius: 3px; color: var(--text-muted); cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .del-btn:hover { border-color: var(--lose); color: var(--lose); }

  .match-body { display: none; padding: 16px; border-top: 1px solid var(--border); }
  .match-body.open { display: block; }
  .match-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .match-fields .field textarea { min-height: 72px; }

  /* Buttons */
  .btn-row { display: flex; gap: 10px; margin-top: 6px; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px;
    border-radius: 4px; font-family: var(--mono); font-size: 12px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border: none; transition: all 0.15s;
  }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #000; }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

  /* Overall */
  .overall-box { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px; }

  /* Output */
  .output-section { margin-top: 36px; }
  .output-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .copy-status { font-size: 11px; color: var(--win); opacity: 0; transition: opacity 0.3s; }
  .copy-status.show { opacity: 1; }
  pre {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 20px; font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.8;
    color: #a0aaba; overflow-x: auto; white-space: pre-wrap; word-break: break-word;
    max-height: 520px; overflow-y: auto;
  }

  @media (max-width: 600px) {
    .match-header { grid-template-columns: 36px 1fr 32px; }
    .match-result-btns { display: none; }
    .match-fields, .grid2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">Street Fighter 6</div>
    <h1>復盤筆記 <span>產生器</span></h1>
    <p class="subtitle">填入對戰記錄，自動產出 Obsidian Markdown 筆記</p>
    <div id="save-badge" style="margin-top:10px;font-family:var(--mono);font-size:11px;letter-spacing:0.08em;color:var(--win);opacity:0;transition:opacity 0.4s;">✓ 已自動儲存</div>
  </header>

  <div class="section">
    <div class="section-label">基本資訊</div>
    <div class="grid2">
      <div class="field">
        <label>日期</label>
        <input type="date" id="date" />
      </div>
      <div class="field">
        <label>段位 / LP（選填）</label>
        <input type="text" id="rank" placeholder="e.g. 金牌 12400LP" />
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">對戰記錄</div>
    <div class="stats-row">
      <div class="stat-badge">總場數 <b id="s-total">0</b></div>
      <div class="stat-badge"><b id="s-win" style="color:var(--win)">0</b><span style="color:var(--win)"> 勝</span></div>
      <div class="stat-badge"><b id="s-lose" style="color:var(--lose)">0</b><span style="color:var(--lose)"> 敗</span></div>
      <div class="stat-badge">勝率 <b id="s-rate">—</b></div>
    </div>
    <div id="char-table-wrap"></div>
    <div class="match-list" id="match-list"></div>
    <div class="btn-row" style="margin-top:14px">
      <button class="btn btn-ghost" onclick="addMatch()">＋ 新增場次</button>
    </div>
  </div>

  <div class="section">
    <div class="section-label">今日總結</div>
    <div class="overall-box">
      <div class="grid2" style="margin-bottom:12px">
        <div class="field">
          <label>今日最大問題</label>
          <input type="text" id="main-issue" placeholder="e.g. Burnout 後的防守選擇失誤" />
        </div>
        <div class="field">
          <label>明日練習重點</label>
          <input type="text" id="next-goal" placeholder="e.g. 特定懲罰 combo 穩定度" />
        </div>
      </div>
      <div class="field">
        <label>今日雜記（自由填寫）</label>
        <textarea id="daily-note" placeholder="今天的狀態、特別感悟、需要回看的片段..."></textarea>
      </div>
    </div>
  </div>

  <div class="btn-row" style="flex-wrap:wrap">
    <button class="btn btn-primary" onclick="generate()">▶ 產生 Obsidian 筆記</button>
    <button class="btn btn-ghost" onclick="exportDraft()">📤 匯出草稿</button>
    <button class="btn btn-ghost" onclick="importDraft()">📥 匯入草稿</button>
    <button class="btn btn-ghost" onclick="clearAll()">清空重設</button>
  </div>

  <!-- Export modal -->
  <div id="export-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px;max-width:560px;width:90%;position:relative">
      <div style="font-family:var(--mono);font-size:11px;letter-spacing:0.2em;color:var(--accent);margin-bottom:12px">📤 匯出草稿</div>
      <p style="font-size:12px;color:var(--text-dim);margin-bottom:12px;line-height:1.7">複製下方文字，到另一台裝置開啟此工具後點「匯入草稿」貼上即可還原進度。</p>
      <textarea id="export-text" readonly style="width:100%;height:120px;font-size:11px;font-family:monospace;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);padding:10px;border-radius:4px;resize:none"></textarea>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-primary" style="padding:8px 18px" onclick="copyExport()">複製全部</button>
        <button class="btn btn-ghost" style="padding:8px 18px" onclick="closeModal('export-modal')">關閉</button>
      </div>
      <span id="export-copy-ok" style="font-size:11px;color:var(--win);margin-left:8px;opacity:0;transition:opacity 0.3s">✓ 已複製</span>
    </div>
  </div>

  <!-- Import modal -->
  <div id="import-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px;max-width:560px;width:90%;position:relative">
      <div style="font-family:var(--mono);font-size:11px;letter-spacing:0.2em;color:var(--accent);margin-bottom:12px">📥 匯入草稿</div>
      <p style="font-size:12px;color:var(--text-dim);margin-bottom:12px;line-height:1.7">貼上從其他裝置匯出的草稿文字，然後點「還原」。</p>
      <textarea id="import-text" placeholder="貼上草稿文字..." style="width:100%;height:120px;font-size:11px;font-family:monospace;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:4px;resize:none"></textarea>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-primary" style="padding:8px 18px" onclick="doImport()">還原進度</button>
        <button class="btn btn-ghost" style="padding:8px 18px" onclick="closeModal('import-modal')">取消</button>
      </div>
      <span id="import-err" style="font-size:11px;color:var(--lose);margin-left:8px;opacity:0;transition:opacity 0.3s">格式錯誤，請確認文字完整</span>
    </div>
  </div>

  <div class="output-section" id="output-section" style="display:none">
    <div class="section-label">輸出預覽</div>
    <div class="output-header">
      <span style="font-size:12px;color:var(--text-dim)" id="filename-label"></span>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="copy-status" id="copy-status">✓ 已複製</span>
        <button class="btn btn-ghost" style="padding:7px 16px" onclick="copyMD()">複製 Markdown</button>
        <button class="btn btn-primary" style="padding:7px 18px" onclick="downloadMD()">下載 .md 檔案</button>
      </div>
    </div>
    <pre id="output-pre"></pre>
  </div>

</div>
<script>
let matches = [];
let matchCounter = 0;

// ── Persistence ───────────────────────────────────────────────────────
const SAVE_KEY = 'sf6_draft';

function saveState() {
  const state = {
    date:      document.getElementById('date').value,
    rank:      document.getElementById('rank').value,
    mainIssue: document.getElementById('main-issue').value,
    nextGoal:  document.getElementById('next-goal').value,
    dailyNote: document.getElementById('daily-note').value,
    matches,
    matchCounter,
  };
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    const s = JSON.parse(raw);
    if(s.date)      document.getElementById('date').value       = s.date;
    if(s.rank)      document.getElementById('rank').value       = s.rank;
    if(s.mainIssue) document.getElementById('main-issue').value  = s.mainIssue;
    if(s.nextGoal)  document.getElementById('next-goal').value   = s.nextGoal;
    if(s.dailyNote) document.getElementById('daily-note').value  = s.dailyNote;
    if(Array.isArray(s.matches) && s.matches.length > 0) {
      matches = s.matches;
      matchCounter = s.matchCounter || s.matches.length;
      return true;
    }
  } catch(e) {}
  return false;
}

function showSaveBadge(msg) {
  const el = document.getElementById('save-badge');
  if(!el) return;
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.opacity = '0'; }, 2500);
}

document.addEventListener('input',  () => { saveState(); showSaveBadge('已自動儲存'); });
document.addEventListener('change', () => { saveState(); showSaveBadge('已自動儲存'); });

// ── Init ──────────────────────────────────────────────────────────────
const _restored = loadState();
if(!_restored) {
  document.getElementById('date').value = new Date().toISOString().split('T')[0];
  for(let i = 0; i < 3; i++) addMatch();
} else {
  renderMatches();
  showSaveBadge('已自動還原上次記錄');
}

function addMatch() {
  matchCounter++;
  const id = matchCounter;
  matches.push({ id, char: '', result: '', rounds: [], opening: '', mistake: '', punish: '', drive: '' });
  renderMatches();
  setTimeout(() => { const b = document.getElementById('body-'+id); if(b) b.classList.add('open'); }, 30);
}

function removeMatch(id) {
  matches = matches.filter(m => m.id !== id);
  renderMatches();
}

function setResult(id, result) {
  const m = matches.find(m => m.id === id);
  if(!m) return;
  m.result = (m.result === result) ? '' : result;
  renderMatches();
}

function setRound(matchId, roundIdx, val) {
  const m = matches.find(m => m.id === matchId);
  if(!m) return;
  // toggle off if same value clicked
  if(m.rounds[roundIdx] === val) {
    m.rounds[roundIdx] = null;
  } else {
    m.rounds[roundIdx] = val;
  }
  // Auto-derive match result from rounds
  const r = m.rounds;
  const myWins  = r.filter(x => x === 'W').length;
  const myLoss  = r.filter(x => x === 'L').length;
  if(myWins >= 2)       m.result = 'W';
  else if(myLoss >= 2)  m.result = 'L';
  else                  m.result = '';
  saveState();
  renderMatches();
}

function updateRoundNote(matchId, roundIdx, val) {
  const m = matches.find(m => m.id === matchId);
  if(!m) return;
  if(!m.roundNotes) m.roundNotes = {};
  m.roundNotes[roundIdx] = val;
  saveState();
}

function updateField(id, field, val) {
  const m = matches.find(m => m.id === id);
  if(m) m[field] = val;
  if(field === 'char' || field === 'result') updateStats();
}

function toggleBody(id) {
  const b = document.getElementById('body-'+id);
  b && b.classList.toggle('open');
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getRoundPlaceholder(ri) {
  if(ri === 0) return '起手選擇、開局意圖、觀察到對方什麼布局？';
  if(ri === 1) return '第1局後調整了什麼？對方如何應對？有無關鍵失誤或變局點？';
  return '決勝局心態與策略、最終變局點、為何贏得或失去這局？';
}

function renderMatches() {
  const list = document.getElementById('match-list');
  list.innerHTML = matches.map((m, i) => {
    const num      = String(i+1).padStart(2,'0');
    const cardClass = m.result==='W' ? 'win-card' : m.result==='L' ? 'lose-card' : '';
    const tagClass  = m.result==='W' ? 'tag-win'  : m.result==='L' ? 'tag-lose'  : 'tag-none';
    const tagLabel  = m.result==='W' ? 'WIN'       : m.result==='L' ? 'LOSE'      : '—';
    const charHtml  = m.char
      ? `<span class="match-char">VS <strong>${esc(m.char)}</strong></span>`
      : `<span class="match-char-placeholder">VS ??</span>`;

    const rounds = m.rounds || [];

    // Build rounds editor rows
    const roundNotes = m.roundNotes || {};
    const roundRows = [0,1,2].map(ri => {
      const v = rounds[ri];
      const isWin  = v === 'W';
      const isLoss = v === 'L';
      const dot = isWin ? '🟢' : isLoss ? '🔴' : '⚪';
      const hidden = ri === 2 && !rounds[0] && !rounds[1] ? 'style="opacity:0.35;pointer-events:none"' : '';
      return `
      <div class="round-row" ${hidden}>
        <div class="round-dot-btns">
          <span class="round-label">第 ${ri+1} 局</span>
          <button class="round-btn ${isWin?'round-win-active':''}" onclick="event.stopPropagation();setRound(${m.id},${ri},'W')">🟢</button>
          <button class="round-btn ${isLoss?'round-lose-active':''}" onclick="event.stopPropagation();setRound(${m.id},${ri},'L')">🔴</button>
          <span class="round-dot-preview" style="${isWin?'background:var(--win);opacity:0.55':isLoss?'background:var(--lose);opacity:0.55':'background:var(--text-muted);opacity:0.15'}"></span>
        </div>
        <input class="round-note-input" value="${esc(roundNotes[ri]||'')}"
          oninput="updateRoundNote(${m.id},${ri},this.value)"
          placeholder="${getRoundPlaceholder(ri)}" />
      </div>`;
    }).join('');

    return `
    <div class="match-card ${cardClass}">
      <div class="match-header" onclick="toggleBody(${m.id})">
        <span class="match-num">${num}</span>
        <div class="match-summary">
          ${charHtml}
          <span class="match-result-tag ${tagClass}">${tagLabel}</span>
        </div>
        <div class="match-result-btns">
          <button class="rb ${m.result==='W'?'win-active':''}"  onclick="event.stopPropagation();setResult(${m.id},'W')">WIN</button>
          <button class="rb ${m.result==='L'?'lose-active':''}" onclick="event.stopPropagation();setResult(${m.id},'L')">LOSE</button>
        </div>
        <button class="del-btn" onclick="event.stopPropagation();removeMatch(${m.id})">×</button>
      </div>
      <div class="match-body" id="body-${m.id}">
        <!-- Char + result row -->
        <div class="grid2" style="margin-bottom:16px">
          <div class="field">
            <label>對陣角色</label>
            <input value="${esc(m.char)}" oninput="updateField(${m.id},'char',this.value)" placeholder="e.g. AKI" />
          </div>
          <div class="field" style="flex-direction:row;align-items:flex-end;gap:8px">
            <button class="rb ${m.result==='W'?'win-active':''}"  style="flex:1;padding:9px" onclick="setResult(${m.id},'W')">WIN</button>
            <button class="rb ${m.result==='L'?'lose-active':''}" style="flex:1;padding:9px" onclick="setResult(${m.id},'L')">LOSE</button>
          </div>
        </div>
        <!-- Round lights -->
        <div class="rounds-section">
          <div class="rounds-section-label">各局燈號</div>
          ${roundRows}
        </div>
        <!-- 4 analysis fields -->
        <div class="match-fields" style="margin-top:14px">
          <div class="field">
            <label>⚠️ 關鍵失誤點</label>
            <textarea oninput="updateField(${m.id},'mistake',this.value)" placeholder="造成扣血或丟局的判斷 / 操作錯誤...">${esc(m.mistake)}</textarea>
          </div>
          <div class="field">
            <label>👊 懲罰機會</label>
            <textarea oninput="updateField(${m.id},'punish',this.value)" placeholder="抓到 / 錯過的懲罰時機，對應技能...">${esc(m.punish)}</textarea>
          </div>
          <div class="field">
            <label>⚡ Drive 管理</label>
            <textarea oninput="updateField(${m.id},'drive',this.value)" placeholder="Drive 使用時機、Burnout 次數、守備端 DR 用法...">${esc(m.drive)}</textarea>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
  updateStats();
}

function updateStats() {
  const total = matches.length;
  const wins  = matches.filter(m => m.result==='W').length;
  const loses = matches.filter(m => m.result==='L').length;
  const rated = wins + loses;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-win').textContent   = wins;
  document.getElementById('s-lose').textContent  = loses;
  document.getElementById('s-rate').textContent  = rated>0 ? Math.round(wins/rated*100)+'%' : '—';

  // Per-char breakdown
  const charMap = {};
  matches.forEach(m => {
    const c = m.char.trim();
    if(!c) return;
    if(!charMap[c]) charMap[c] = {total:0, wins:0};
    charMap[c].total++;
    if(m.result==='W') charMap[c].wins++;
  });

  const wrap = document.getElementById('char-table-wrap');
  const entries = Object.entries(charMap).sort((a,b)=>b[1].total-a[1].total);

  if(entries.length === 0) {
    wrap.innerHTML = '';
    return;
  }

  const rows = entries.map(([c, s]) => {
    const losses = s.total - s.wins;
    const rate   = s.total > 0 ? Math.round(s.wins/s.total*100) : 0;
    const rateClass = rate >= 60 ? 'rate-hi' : rate >= 40 ? 'rate-mid' : 'rate-lo';
    return `<tr>
      <td class="cn">${c}</td>
      <td class="r">${s.total}</td>
      <td class="r" style="color:var(--win)">${s.wins}</td>
      <td class="r" style="color:var(--lose)">${losses}</td>
      <td class="r ${rateClass}">${rate}%</td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `<div class="char-table-wrap">
    <table class="char-table">
      <thead><tr>
        <th>對陣角色</th>
        <th class="r">總場</th>
        <th class="r">勝</th>
        <th class="r">敗</th>
        <th class="r">勝率</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function generate() {
  const date      = document.getElementById('date').value || new Date().toISOString().split('T')[0];
  const rank      = document.getElementById('rank').value.trim();
  const mainIssue = document.getElementById('main-issue').value.trim();
  const nextGoal  = document.getElementById('next-goal').value.trim();
  const dailyNote = document.getElementById('daily-note').value.trim();

  const dateLabel = date.replace(/-/g,'/');
  const total  = matches.length;
  const wins   = matches.filter(m=>m.result==='W').length;
  const losses = matches.filter(m=>m.result==='L').length;
  const rated  = wins+losses;
  const winrate = rated>0 ? Math.round(wins/rated*100)+'%' : 'N/A';

  const charMap = {};
  matches.forEach(m => {
    const c = m.char.trim();
    if(!c) return;
    if(!charMap[c]) charMap[c] = {total:0,wins:0};
    charMap[c].total++;
    if(m.result==='W') charMap[c].wins++;
  });

  const charRows = Object.entries(charMap)
    .sort((a,b)=>b[1].total-a[1].total)
    .map(([c,s])=>{
      const cr = s.total>0 ? Math.round(s.wins/s.total*100)+'%' : 'N/A';
      return `| ${c} | ${s.total} | ${s.wins} | ${s.total-s.wins} | ${cr} |`;
    }).join('\n') || '| — | — | — | — | — |';

  const rankLine = rank ? `**段位：** ${rank}  \n` : '';

  const matchSections = matches.map((m,i) => {
    const char   = m.char.trim()||'??';
    const res    = m.result==='W'?'✅ WIN':m.result==='L'?'❌ LOSE':'⬜ ?';
    const rounds = m.rounds || [];
    const notes  = m.roundNotes || {};
    const lightStr = [0,1,2]
      .filter(ri => rounds[ri])
      .map(ri => {
        const dot  = rounds[ri]==='W' ? '🟢' : '🔴';
        const note = (notes[ri]||'').trim();
        return note ? `${dot}｜${note}` : dot;
      }).join('\n——————————\n');

    const lines = [];
    if(lightStr) lines.push(lightStr);
    if(m.mistake) lines.push(`**⚠️ 關鍵失誤：** ${m.mistake.trim()}`);
    if(m.punish)  lines.push(`**👊 懲罰機會：** ${m.punish.trim()}`);
    if(m.drive)   lines.push(`**⚡ Drive 管理：** ${m.drive.trim()}`);
    const body = lines.length ? lines.join('\n\n') : '_（無詳細記錄）_';
    const roundsHeader = rounds.filter(Boolean).map(r=>r==='W'?'🟢':'🔴').join('');
    return `### Match ${i+1}. VS ${char}　${roundsHeader}　${res}\n\n${body}`;
  }).join('\n\n---\n\n');

  const summaryBlock = [
    mainIssue ? `**最大問題：** ${mainIssue}` : '',
    nextGoal  ? `**明日重點：** ${nextGoal}`  : '',
    dailyNote ? `\n${dailyNote}` : '',
  ].filter(Boolean).join('\n') || '_（無填寫）_';

  const md = `---
tags: [SF6, 復盤, ${date}]
date: ${date}
---

# 復盤 ${dateLabel}

## 📊 今日統計

${rankLine}**總場數：** ${total}　**勝場：** ${wins}　**敗場：** ${losses}　**勝率：** ${winrate}

### 對陣角色統計

| 對陣角色 | 總場 | 勝場 | 敗場 | 勝率 |
| :------- | ---: | ---: | ---: | ---: |
${charRows}

---

## 💬 今日總結

${summaryBlock}

---

## 🎮 對戰記錄

${matchSections}
`.trim();

  document.getElementById('output-pre').textContent = md;
  const fname = '復盤'+date.replace(/-/g,'')+'.md';
  document.getElementById('filename-label').textContent = fname;
  document.getElementById('output-section').style.display = 'block';
  document.getElementById('output-section').scrollIntoView({behavior:'smooth',block:'start'});
  window._md = md;
  window._filename = fname;
}

function copyMD() {
  if(!window._md) return;
  navigator.clipboard.writeText(window._md).then(()=>{
    const el = document.getElementById('copy-status');
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),2000);
  });
}

function downloadMD() {
  if(!window._md) return;
  const blob = new Blob([window._md],{type:'text/markdown;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = window._filename||'obsidian_note.md';
  a.click();
}

function exportDraft() {
  saveState();
  try {
    const raw = localStorage.getItem(SAVE_KEY) || '{}';
    document.getElementById('export-text').value = raw;
    showModal('export-modal');
  } catch(e) { alert('匯出失敗'); }
}

function copyExport() {
  const ta = document.getElementById('export-text');
  ta.select(); ta.setSelectionRange(0, 99999);
  navigator.clipboard.writeText(ta.value).then(() => {
    const el = document.getElementById('export-copy-ok');
    el.style.opacity = '1';
    setTimeout(() => el.style.opacity = '0', 2000);
  }).catch(() => { document.execCommand('copy'); });
}

function importDraft() {
  document.getElementById('import-text').value = '';
  document.getElementById('import-err').style.opacity = '0';
  showModal('import-modal');
}

function doImport() {
  const raw = document.getElementById('import-text').value.trim();
  try {
    const s = JSON.parse(raw);
    if(!Array.isArray(s.matches)) throw new Error('bad');
    localStorage.setItem(SAVE_KEY, raw);
    closeModal('import-modal');
    // reload state
    matches = []; matchCounter = 0;
    loadState();
    renderMatches();
    showSaveBadge('✓ 草稿已還原');
  } catch(e) {
    const el = document.getElementById('import-err');
    el.style.opacity = '1';
    setTimeout(() => el.style.opacity = '0', 3000);
  }
}

function showModal(id) {
  const el = document.getElementById(id);
  el.style.display = 'flex';
}
function closeModal(id) {
  document.getElementById(id).style.display = 'none';
}
// Close modal on backdrop click
document.addEventListener('click', e => {
  ['export-modal','import-modal'].forEach(id => {
    const el = document.getElementById(id);
    if(el && e.target === el) el.style.display = 'none';
  });
});

function clearAll() {
  if(!confirm('確定要清空所有記錄嗎？')) return;
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
  matches=[]; matchCounter=0;
  ['rank','main-issue','next-goal','daily-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('date').value = new Date().toISOString().split('T')[0];
  document.getElementById('output-section').style.display='none';
  for(let i=0;i<3;i++) addMatch();
}

renderMatches();
</script>
</body>
